{{ if and .Values.buildtypesExtract (semverCompare ">=1.35-0" .Capabilities.KubeVersion.GitVersion) .Values.useImageVolumes }}
{{- $dot := . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bw5ce-utilities.fullname" $dot }}-buildtype-extract-v2-{{ randAlphaNum 4 | lower }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bw5ce-utilities.labels" . | nindent 4 }}
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600  # Cleanup of jobs from key/value store after 100 sec
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "bw5ce-utilities.selectorLabels" . | nindent 8 }}
        {{- include "bw5ce-utilities.networkPolicyLabels" . | nindent 8 }}
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      restartPolicy: Never
      # serviceAccountName: {{ include "bw5ce-utilities.service-account-name" . }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
      - name: bw5ce-buildtype-extract
        image: {{ include "bw5ce-utilities.image.registry" $dot }}{{"/"}}{{ include "bw5ce-utilities.infra.image.repository" $dot }}{{"/"}}{{ $.Values.debug.image.name }}:{{ $.Values.debug.image.tag }}
        imagePullPolicy: {{ $.Values.image.pullPolicy }}
        {{- with $.Values.probes.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $.Values.securityContext }}
        securityContext:
        {{- toYaml $.Values.securityContext | nindent 10 }}
        {{- end }}
        {{- if $.Values.global.tibco.enableResourceConstraints }}
        resources:
        {{- toYaml $.Values.scripts.resources | nindent 10 }}
        {{- end }}
        command:
          - "sh"
          - "-c"
          - |
          {{- range $index, $image := .Values.buildtypeImages }}
          {{- if $image.delete_image  }}
            path=/usr/share/nginx/html/{{ $image.target_location }}/{{ $image.tag }}
            rm -rf "${path}"
            echo "Deleted buildtype from location: $path"
          {{- end }}
          {{- if $image.extract_image  }}
            # Extract the buildtype image to get the buildtype contents
            mkdir -p /usr/share/nginx/html/{{ $image.target_location }}/{{ $image.tag }}
            echo "Extracting buildtype {{ $image.name }} with tag {{ $image.tag }}"
            cp -r /tmp/{{ $image.name }}/{{ $image.tag }}{{ $image.path }}/* /usr/share/nginx/html/{{ $image.target_location }}/{{ $image.tag }}/
          {{- end }}
          {{- end }}
        volumeMounts:
          - name: store-vol
            mountPath: {{ $.Values.volumes.plugins.mountPath }}
            subPath: {{ $.Values.volumes.plugins.subPath }}
          {{- range $index, $image := .Values.buildtypeImages }}
          {{- if $image.extract_image  }}
          - name: {{ $image.name | lower }}-{{ $image.tag | replace "." "-" | lower }}-img-vol
            mountPath: /tmp/{{ $image.name }}/{{ $image.tag }}
          {{- end }}
          {{- end }}
      volumes:
      - name: store-vol
        persistentVolumeClaim:
          claimName: {{ include "bw5ce-utilities.pvc-name" $dot }}
      {{- range $index, $image := .Values.buildtypeImages }}
      {{- if $image.extract_image  }}
      - name: {{ $image.name | lower }}-{{ $image.tag | replace "." "-" | lower }}-img-vol
        image:
          reference: {{ include "bw5ce-utilities.image.registry" $dot }}{{"/"}}{{ include "bw5ce-utilities.infra.image.repository" $dot }}{{"/"}}{{ $image.name }}:{{ $image.tag }}
          pullPolicy: IfNotPresent
      {{- end }}
      {{- end }}
{{- if (include "bw5ce-utilities.container-registry.secret" $dot) }}
      imagePullSecrets:
        - name: {{ include "bw5ce-utilities.container-registry.secret" $dot }}          
{{- end }} 
{{- end }}
