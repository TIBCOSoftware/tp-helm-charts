apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tp-cp-o11y.consts.appName" . }}
  labels:
    {{- include "tp-cp-o11y.shared.labels.standard" . | nindent 4 }}
spec:
{{- if .Values.replicaCount }}
  replicas: {{ .Values.replicaCount }}
{{- end }}
  selector:
    matchLabels:
      {{- include "tp-cp-o11y.shared.labels.selector" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "tp-cp-o11y.shared.labels.standard" . | nindent 8 }}
        networking.platform.tibco.com/logServer-egress: enable
        networking.platform.tibco.com/internet-egress: enable
        networking.platform.tibco.com/cluster-egress: enable
    spec:
      terminationGracePeriodSeconds: 30
{{- if (include "tp-cp-o11y.container-registry.secret" .) }}
      imagePullSecrets:
      - name: {{ include "tp-cp-o11y.container-registry.secret" . }}
{{- end }}
      serviceAccountName: {{ include "tp-cp-o11y.service-account-name" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: check-sql-schema-version
          image: '{{ include "cp-core-configuration.container-registry" .}}{{"/"}}{{ include "cp-core-configuration.image-repository" . }}/core-cp-scripts:{{ .Values.global.tibco.commonImages.cpScripts.tag }}'
          {{- if .Values.securityContext }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.checkPermissionEngine.resources | nindent 12 }}
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_PREFIX
              value: {{ .Values.global.tibco.controlPlaneInstanceId }}_
            - name: PGHOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.tibco.tcta.TCTA_DB_CONFIGURATION }}
                  {{- if eq .Values.global.tibco.is_replica_region true }}
                  key: MasterWriterHost
                  {{- else }}
                  key: DBHost
                  {{- end }}
            - name: PGPORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.tibco.tcta.TCTA_DB_CONFIGURATION }}
                  key: DBPort
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: tasdataserver-postgres-credential
                  key: PGPASSWORD
          command:
            - "/bin/bash"
            - "-c"
            - |
              /opt/tibco/tsc/scripts/postgres-helper.bash check-schema-version tasdataserver
      containers:
        - name: tp-cp-o11y
          image: {{ include "tp-cp-o11y.image.registry" .}}{{"/"}}{{ include "tp-cp-o11y.image.repository" .}}{{"/"}}{{ .Values.image.name }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.securityContext }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- end }}
          {{- if .Values.global.tibco.enableResourceConstraints }} 
          {{- with .Values.o11yservice.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: tp-o11yservice
          env:
            - name: WHO
              value: {{include "tp-cp-o11y.cp-instance-id" .}}
            - name: IS_CP
              value: "true"
            - name: IS_ON_PREM
              value: "{{ include "tp-cp-o11y.CPCustomerEnv" . }}"
            - name: CP_DP_URL
              value: {{ include "tp-cp-o11y.cp-dp-url" . }}
            - name: CP_O11Y_DPCACHE_ENABLED
              value: "true"
            - name: PGHOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.tibco.tcta.TCTA_DB_CONFIGURATION }}
                  {{- if eq .Values.global.tibco.is_replica_region true }}
                  key: MasterWriterHost
                  {{- else }}
                  key: DBHost
                  {{- end }}
            - name: PGPORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.tibco.tcta.TCTA_DB_CONFIGURATION }}
                  key: DBPort
            - name: READ_PGHOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.tibco.tcta.TCTA_DB_CONFIGURATION }}
                  {{- if eq .Values.global.tibco.is_replica_region true }}
                  key: LocalReaderHost
                  {{- else }}
                  key: DBHost
                  {{- end }}
            - name: READ_PGPORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.global.tibco.tcta.TCTA_DB_CONFIGURATION }}
                  key: DBPort
            - name: WRITE_POSTGRES_ENDPOINT_URL
              value: "$(PGHOST):$(PGPORT)"
            - name: READ_POSTGRES_ENDPOINT_URL
              value: "$(READ_PGHOST):$(READ_PGPORT)"
            - name: POSTGRES_DATABASE_SSL_MODE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "tp-cp-o11y.consts.cp.db.configuration" . }}
                  key: DBSSLMode
            - name: POSTGRES_DATABASE_SSL_CERT
              value: ""
            - name: POSTGRES_DATABASE_SSL_KEY
              value: ""
            - name: POSTGRES_DATABASE_SSL_ROOT_CERT
              value: /private/tsc/certificates/{{ .Values.global.tibco.db_ssl_root_cert_filename }}
            - name: TCTA_DTS_DB_HOSTPORT
              value: "$(PGHOST):$(PGPORT)"
            - name: TCTA_DTS_DB_USER_NAME
              value: {{ include "tp-cp-o11y.cp-instance-id" . }}_tctadataserveruser
            - name: TCTA_DTS_DB_USER_PWD
              valueFrom:
                secretKeyRef:
                  name: tasdataserver-postgres-credential
                  key: PGPASSWORD
            - name: TCTA_DTS_DB_NAME
              value: {{ include "tp-cp-o11y.cp-instance-id" . }}_tctadataserver
            - name: TCTA_DTS_DB_SCHEMA_NAME
              value: {{ include "tp-cp-o11y.cp-instance-id" . }}_tctadataserver
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CP_DP_PROXY_HOST
              valueFrom:
                configMapKeyRef:
                  key: TP_DP_PROXY_HOST
                  name: tp-cp-core-dnsdomains
            - name: CP_DP_PROXY_PORT
              value: "80"
            - name: AUDITTRAIL_ENABLED
              value: {{ .Values.audittrail.enabled | quote }}
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: v1/healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: v1/healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          startupProbe:
            httpGet:
              scheme: HTTP
              path: v1/healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          volumeMounts:
            - mountPath: /usr/tp/discovery
              name: o11y-efs-vol
              subPath: o11y/discovery
            - mountPath: /usr/tp/dashboard
              name: o11y-efs-vol
              subPath: o11y/dashboard
            - name: logs
              mountPath: /tmp/logs
            - name: cp-otel-config
              readOnly: true
              mountPath: "/o11y/cfgs"
            - name: cp-otel-secret
              readOnly: true
              mountPath: "/o11y/secrets"
{{- if ne .Values.global.external.db_ssl_mode "disable" }}
            - mountPath: /private/tsc/certificates
              name: db-ssl-cert-vol
              readOnly: true
{{- end }}
  {{- if .Values.o11ymcpserver.enabled }}
        - name: o11y-mcp-server
          image: {{ include "tp-cp-o11y.image.registry" .}}{{"/"}}{{ include "tp-cp-o11y.image.repository" .}}{{"/"}}{{ .Values.o11ymcpserver.image.name }}:{{ .Values.o11ymcpserver.image.tag }}
          imagePullPolicy: IfNotPresent
          {{- if .Values.securityContext }}
          securityContext:
           {{- toYaml .Values.securityContext | nindent 12 }}
         {{- end }}
          resources:
            requests:
              cpu: {{ .Values.o11ymcpserver.resources.requests.cpu }}
              memory: {{ .Values.o11ymcpserver.resources.requests.memory }}
            limits:
              cpu: {{ .Values.o11ymcpserver.resources.limits.cpu }}
              memory: {{ .Values.o11ymcpserver.resources.limits.memory }}
          ports:
            - containerPort: 8000
              name: o11y-mcp-server
          livenessProbe:
            httpGet:
              path: /healthz
              port: o11y-mcp-server
            failureThreshold: 3
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /healthz
              port: o11y-mcp-server
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          env:
            - name: MCP_SIDECAR_MODE
              value: "true"
            - name: MCP_DEV_MODE
              value: "false"
            - name: PORT
              value: "8000"
  {{- end }}
  {{- if .Values.global.tibco.logging.fluentbit.enabled }}
        - name: fluentbit
          image: {{ include "tp-cp-o11y.image.registry" .}}{{"/"}}{{ include "tp-cp-o11y.image.repository" .}}{{"/common-fluentbit"}}:{{ .Values.global.tibco.commonImages.fluentbit.tag }}
          imagePullPolicy: IfNotPresent
          {{- if .Values.securityContext }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- end }}
          {{- if .Values.global.tibco.enableResourceConstraints }} 
          {{- with .Values.global.tibco.logging.fluentbit.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: CONTAINER_NAME
              value: tp-cp-o11y
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - containerPort: 2020
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/health
              port: 2020
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/health
              port: 2020
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 5
            httpGet:
              path: /api/v1/health
              port: 2020
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          volumeMounts:
            - name: logs
              mountPath: /var/log/pods
            - name: db
              mountPath: /var/log/db
            - name: config-volume
              mountPath: /fluent-bit/etc/
{{- end }}
      volumes:
        - name: o11y-efs-vol
          persistentVolumeClaim:
            claimName: {{ include "tp-cp-o11y.pvc-name" . }}
        - name: logs
          emptyDir: {}
{{- if .Values.global.tibco.logging.fluentbit.enabled }}
        - name: db
          emptyDir: {}
        - name: config-volume
          configMap:
            name: {{ include "tp-cp-o11y.consts.appName" . }}-fluentbit-config
{{- end }}
{{- if ne .Values.global.external.db_ssl_mode "disable" }}
        - name: db-ssl-cert-vol
          secret:
            secretName: {{ .Values.global.tibco.db_ssl_root_cert_secretname }}
{{- end }}
        - name: cp-otel-config
          configMap:
            name: cp-otel-service
            optional: true
        - name: cp-otel-secret
          secret:
            secretName: cp-otel-service
            optional: true