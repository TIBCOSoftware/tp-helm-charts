# Prometheus Services
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: {{ include "tp-cp-prometheus.consts.namespace" . }}
  labels:
    {{- include "tp-cp-prometheus.shared.labels.standard" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "tp-cp-prometheus.shared.labels.selector" . | nindent 4 }}
  ports:
    - port: 9090
      targetPort: 9090
      name: prometheus-service

