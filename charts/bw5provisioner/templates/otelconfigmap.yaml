apiVersion: v1
kind: ConfigMap
metadata:
  annotations:
    use-subpath: "true"
  labels:
    {{- include "bw5provisioner.labels" . | nindent 4 }}
  name: fluentbit-config-otel-bw5ce
data:
  fluent-bit.conf: |
      {{- (tpl .Values.fluentbit.apps.config.fluentbitconf $) | nindent 4 }}
  filters.conf: |
      {{- (tpl .Values.fluentbit.apps.config.filtersconf $) | nindent 4 }}
  parsers.conf: |
      {{- (tpl .Values.fluentbit.apps.config.parsersconf $) | nindent 4 }}
  input-tail.conf: |
      {{- (tpl .Values.fluentbit.apps.config.inputtailconf $) | nindent 4 }}
  output-otel.conf: |
      {{- (tpl .Values.fluentbit.apps.config.outputotelconf $) | nindent 4 }}
  update_record.lua: |
      {{- (tpl .Values.fluentbit.apps.config.updaterecordlua $) | nindent 4 }}
