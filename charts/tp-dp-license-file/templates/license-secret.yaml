apiVersion: v1
kind: Secret
metadata:
  name: cp-license-file-secret
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- range $filename, $content := .Values.global.cp.dataplane.licenseFiles }}
  {{ $filename }}: {{ $content | quote }}
  {{- end }}
