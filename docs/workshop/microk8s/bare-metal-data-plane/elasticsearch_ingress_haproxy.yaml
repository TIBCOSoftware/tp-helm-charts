apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    haproxy.org/backend-protocol: https
    haproxy.org/request-set-header: |
      X-Forwarded-Host %[req.hdr(host)]
      X-Forwarded-Port 443
      X-Forwarded-Proto https
      X-Forwarded-Prefix /o11y/traces-server
    haproxy.org/path-rewrite: /o11y/traces-server/(.*) /\1
    haproxy.org/ssl-passthrough: "true"
  name: haproxy-elastic
  namespace: elastic
spec:
  ingressClassName: %%REPLACE_WITH_YOUR_INGRESS_CLASS_NAME%%
  rules:
  - host: %%REPLACE_ME_WITH_MACHINE_HOST_NAME%%
    http:
      paths:
      - backend:
          service:
            name: elasticsearch-master
            port:
              number: 9200
        path: /o11y/traces-server/
        pathType: Prefix
